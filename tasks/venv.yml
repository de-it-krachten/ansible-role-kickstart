---

- name: Create virtualenv
  ansible.builtin.pip:
    name: "{{ venv_base_packages }}"
    virtualenv: "{{ venv_root }}"
    virtualenv_command: "python3 -m venv"
    extra_args: --upgrade
  become: "{{ kickstart_venv_become | bool }}"
  vars:
    venv_base_packages:
      - pip
      - wheel
      - setuptools

- name: Install packages
  ansible.builtin.pip:
    name: "{{ venv_packages }}"
    virtualenv: "{{ venv_root }}"
  become: "{{ kickstart_venv_become | bool }}"
